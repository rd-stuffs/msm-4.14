name: Build Kernel

on:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      TZ: America/Sao_Paulo
      KBUILD_BUILD_USER: nobody
      KBUILD_BUILD_HOST: android-build

    steps:
      - name: Checkout
        uses: actions/checkout@main

      - name: Build
        run: |
          bash build.sh
          bash build.sh --su

      - name: Upload artifacts
        uses: actions/upload-artifact@main
        with:
          name: kernel-zips
          path: "*.zip"

      - name: Send to Telegram
        run: |
          DATE=$(date '+%H:%M %d/%m/%Y')
          COMMIT="https://github.com/${{ github.repository }}/commit/$(git rev-parse HEAD)"
          STANDARD=$(ls FSociety-surya-*.zip)
          KSU=$(ls FSociety-KSU-*.zip)
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"${STANDARD}" \
            -F caption="${DATE}"$'\n\n'"${COMMIT}"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendDocument" \
            -F chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -F document=@"${KSU}"
